<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>E-Commerce Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container py-5">
        <h2 class="mb-4">Live Offers & Announcements</h2>

        <div class="card mb-4">
            <div class="card-body">
                <div class="input-group">
                    <input type="text" id="tokenInput" class="form-control"
                        placeholder="Paste your User JWT Token here">
                    <button class="btn btn-primary" onclick="authenticate()">Connect & Authenticate</button>
                </div>
                <small id="authStatus" class="text-muted mt-2 d-block">Not connected</small>
            </div>
        </div>

        <div id="messagesContainer" class="d-flex flex-column gap-3">
            <!-- Messages will appear here -->
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="index.js"></script>
</body>

</html>
